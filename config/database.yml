# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: appointment_scheduler_development
  host:     <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USER", nil) %>
  password: <%= ENV.fetch("DB_PASSWORD", nil) %>

test:
  <<: *default
  database: appointment_scheduler_test
  host:     <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USER", nil) %>
  password: <%= ENV.fetch("DB_PASSWORD", nil) %>

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
production:
  primary: &primary_production
    <<: *default
    host:     <%= ENV["DB_HOST"].presence || Rails.application.credentials.dig(:postgres, :hostname) %>
    username: <%= ENV["DB_USER"].presence || Rails.application.credentials.dig(:postgres, :user) || "appointment_scheduler" %>
    password: <%= ENV["APPOINTMENT_SCHEDULER_DATABASE_PASSWORD"].presence || ENV["DB_PASSWORD"].presence || Rails.application.credentials.dig(:postgres, :password) %>
    port:     <%= ENV["DB_PORT"].presence || Rails.application.credentials.dig(:postgres, :port) %>
    database: appointment_scheduler_production
  cache:
    <<: *primary_production
    database: appointment_scheduler_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: appointment_scheduler_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: appointment_scheduler_production_cable
    migrations_paths: db/cable_migrate

staging:
  primary: &primary_staging
    <<: *default
    host:     <%= ENV["DB_HOST"].presence || Rails.application.credentials.dig(:postgres, :hostname) %>
    username: <%= ENV["DB_USER"].presence || Rails.application.credentials.dig(:postgres, :user) %>
    password: <%= ENV["APPOINTMENT_SCHEDULER_DATABASE_PASSWORD"].presence || ENV["DB_PASSWORD"].presence || Rails.application.credentials.dig(:postgres, :password) %>
    port:     <%= ENV["DB_PORT"].presence || Rails.application.credentials.dig(:postgres, :port) %>
    database: appointment_scheduler_staging
  cache:
    <<: *primary_staging
    database: appointment_scheduler_staging_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_staging
    database: appointment_scheduler_staging_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_staging
    database: appointment_scheduler_staging_cable
    migrations_paths: db/cable_migrate
