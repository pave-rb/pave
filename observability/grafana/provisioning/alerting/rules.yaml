apiVersion: 1

groups:
  - orgId: 1
    name: observability-stack
    folder: Observability
    interval: 1m
    rules:
      - uid: otel_collector_down
        title: OTel Collector Down
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max(up{job="otel-collector"})
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: OpenTelemetry Collector metrics are unavailable.
          description: Prometheus could not observe the OpenTelemetry Collector scrape target for 2 minutes.
        labels:
          severity: critical
          component: observability
          signal: exporter

      - uid: postgres_exporter_down
        title: PostgreSQL Exporter Down
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max(up{job="postgres-exporter"})
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: PostgreSQL exporter metrics are unavailable.
          description: Prometheus could not scrape the PostgreSQL exporter for 5 minutes.
        labels:
          severity: warning
          component: postgresql
          signal: exporter

  - orgId: 1
    name: postgresql-health
    folder: Observability
    interval: 1m
    rules:
      - uid: postgres_down
        title: PostgreSQL Down
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max(pg_up{job="postgres-exporter"})
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: PostgreSQL is unavailable.
          description: The PostgreSQL exporter reported pg_up below 1 for 2 minutes.
        labels:
          severity: critical
          component: postgresql
          signal: availability

      - uid: postgres_conn_saturation_high
        title: PostgreSQL Connection Saturation High
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(pg_stat_activity_count{job="postgres-exporter"}) / max(pg_settings_max_connections{job="postgres-exporter"})
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.8]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: PostgreSQL connection usage is above 80% of max_connections.
          description: Connection usage has stayed above 80% for 10 minutes.
        labels:
          severity: warning
          component: postgresql
          signal: saturation

      - uid: postgres_long_tx_high
        title: PostgreSQL Long Transaction
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max(pg_stat_activity_max_tx_duration{job="postgres-exporter"})
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [300]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: PostgreSQL has a transaction older than 5 minutes.
          description: The longest open transaction has stayed above 300 seconds for 10 minutes.
        labels:
          severity: warning
          component: postgresql
          signal: saturation
