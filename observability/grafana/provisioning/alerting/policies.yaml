apiVersion: 1

policies:
  - orgId: 1
    receiver: super-admin-email
    group_by: ["alertname", "grafana_folder", "component"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: super-admin-critical-email
        object_matchers:
          - ["severity", "=", "critical"]
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 30m

      - receiver: super-admin-email
        object_matchers:
          - ["severity", "=", "warning"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 2h
