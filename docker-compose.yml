services:
  postgres:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: postgres:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: postgres

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      BINDING: 0.0.0.0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: pave
    tty: true
    stdin_open: true
    command: bash -c "./bin/rails db:prepare && bin/dev"

  # --- Observability Stack ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics export

  tempo:
    image: grafana/tempo:2.7.2
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/config.yaml
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]

  loki:
    image: grafana/loki:3.4.3
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  alloy:
    image: grafana/alloy:v1.8.3
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["run", "/etc/alloy/config.alloy"]
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles: ["host-observability"]
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles: ["host-observability"]
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  grafana:
    image: grafana/grafana:11.5.2
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GRAFANA_ALERT_EMAILS: "alerts@example.test"
      GRAFANA_ALERT_CRITICAL_EMAILS: "alerts-critical@example.test"
    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  postgres_data:
  bundle_cache:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
